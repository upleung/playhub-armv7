server:
  port: 18080
  tomcat:
    threads:
      max: 16
      min-spare: 2
    accept-count: 8
    max-http-response-header-size: 8KB

spring:
  jackson:
    serialization:
      indent-output: true
  session:
    timeout: 1440m

app:
  cache-dir: .cache/tvbox
  spider-bridge-url: "http://localhost:18081"
  node-command: "node"
  python-command: "C:\\Users\\Hurry\\AppData\\Roaming\\uv\\python\\cpython-3.14.4-windows-x86_64-none\\python.exe"

logging:
  level:
    root: WARN
    com.tvbox: INFO
    org.springframework: WARN
    org.apache: WARN
  file:
    path: .logs

bridge:
  port: 18081
  spider-jar-url: "https://ghfast.top/raw.githubusercontent.com/qist/tvbox/master/xiaosa/spider.jar"
  cache-dir: ".cache/tvbox"
  spider-operation-timeout-seconds: 25
  spider-operation-max-concurrency: 2
  spider-operation-queue-capacity: 4
  spider-cache-max-classloaders: 8
  spider-cache-max-spiders: 32
  script-timeout-seconds: 90
  script-max-concurrency: 2
  script-admission-timeout-seconds: 3
  dex2jar-command: "set JAVA_HOME=C:\\Program Files\\Java\\jdk-26.0.1 && set PATH=%JAVA_HOME%\\bin;%PATH% && \"d:\\develop\\Playhub\\tools\\dex-tools-v2.4\\d2j-dex2jar.bat\" {input} -o {output} --force"
